services:
  api:
    build:
      context: .
      target: dev
    ports:
      - "4870:4870"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/shop_barber?schema=public
      NODE_ENV: development
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change-me-access}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-refresh}
      JWT_ACCESS_EXPIRES: ${JWT_ACCESS_EXPIRES:-15m}
      JWT_REFRESH_EXPIRES: ${JWT_REFRESH_EXPIRES:-7d}
      # Se o watch não disparar no WSL2 (alterações não recompilam), descomente:
      # CHOKIDAR_USEPOLLING: "true"
    volumes:
      - .:/app                 # bind-mount do código (reflete alterações sem rebuild)
      - /app/node_modules      # volume anônimo: preserva o node_modules da imagem
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: shop_barber
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d shop_barber"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data_dev:
